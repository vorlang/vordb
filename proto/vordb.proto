syntax = "proto3";
package vordb;

// CRDT state schemas (RocksDB storage format)

message LwwEntry {
  bytes value = 1;
  int64 timestamp = 2;
  string node_id = 3;
  bool is_tombstone = 4;
  int64 expires_at = 5;       // 0 = no expiration
}

message OrswotDots {
  map<string, int64> dots = 1;
}

message OrswotState {
  map<string, OrswotDots> entries = 1;
  map<string, int64> clock = 2;
  int64 expires_at = 3;       // 0 = no expiration
  int64 last_modified = 4;
}

message PnCounter {
  map<string, int64> p = 1;
  map<string, int64> n = 2;
  int64 expires_at = 3;       // 0 = no expiration
  int64 last_modified = 4;
}

// Client protocol

message Request {
  uint32 request_id = 1;
  oneof body {
    PutRequest put = 10;
    GetRequest get = 11;
    DeleteRequest delete = 12;
    SetAddRequest set_add = 20;
    SetRemoveRequest set_remove = 21;
    SetMembersRequest set_members = 22;
    CounterIncrementRequest counter_increment = 30;
    CounterDecrementRequest counter_decrement = 31;
    CounterValueRequest counter_value = 32;
  }
}

message Response {
  uint32 request_id = 1;
  oneof body {
    OkResponse ok = 10;
    ValueResponse value = 11;
    NotFoundResponse not_found = 12;
    SetMembersResponse set_members = 20;
    CounterValueResponse counter_value = 30;
    ErrorResponse error = 50;
  }
}

message PutRequest {
  string bucket = 1;
  string key = 2;
  bytes value = 3;
}

message GetRequest {
  string bucket = 1;
  string key = 2;
}

message DeleteRequest {
  string bucket = 1;
  string key = 2;
}

message OkResponse {
  int64 timestamp = 1;
}

message ValueResponse {
  string key = 1;
  bytes value = 2;
}

message NotFoundResponse {
  string key = 1;
}

message SetAddRequest {
  string bucket = 1;
  string key = 2;
  string element = 3;
}

message SetRemoveRequest {
  string bucket = 1;
  string key = 2;
  string element = 3;
}

message SetMembersRequest {
  string bucket = 1;
  string key = 2;
}

message SetMembersResponse {
  string key = 1;
  repeated string members = 2;
}

message CounterIncrementRequest {
  string bucket = 1;
  string key = 2;
  int64 amount = 3;
}

message CounterDecrementRequest {
  string bucket = 1;
  string key = 2;
  int64 amount = 3;
}

message CounterValueRequest {
  string bucket = 1;
  string key = 2;
}

message CounterValueResponse {
  string key = 1;
  int64 value = 2;
}

message ErrorResponse {
  string message = 1;
  string code = 2;
}
